<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptToDeploy AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-4xl mx-auto p-8">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-semibold tracking-tight mb-3">PromptToDeploy AI</h1>
            <p class="text-xl text-zinc-400">Prompt → Branded Canva Design → Live Website</p>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-8 shadow-2xl">
            <textarea id="prompt" rows="4" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-6 text-lg focus:outline-none focus:border-blue-500 resize-none" placeholder="Describe your website or design... e.g. Modern SaaS landing page for AI design tool, blue and black colors..."></textarea>
            
            <button onclick="runPipeline()" class="mt-6 w-full bg-blue-600 hover:bg-blue-500 transition-colors text-white font-medium py-5 rounded-2xl text-xl flex items-center justify-center gap-3">
                <span>🚀 Run Full Pipeline</span>
            </button>
        </div>

        <div id="output" class="mt-10 hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-zinc-900 rounded-3xl p-6">
                    <h3 class="font-medium text-blue-400 mb-4">1. Canva Design Prompt</h3>
                    <div id="canva-prompt" class="text-sm bg-zinc-800 p-4 rounded-2xl font-mono whitespace-pre-wrap"></div>
                </div>
                <div class="bg-zinc-900 rounded-3xl p-6">
                    <h3 class="font-medium text-emerald-400 mb-4">2. Drive Folder</h3>
                    <a href="https://drive.google.com/drive/folders/1X2gLjkrhFI3dIkBnXyZBuwHrLKPXWD2K" target="_blank" class="text-blue-400 hover:underline">Open Project Folder →</a>
                </div>
                <div class="bg-zinc-900 rounded-3xl p-6">
                    <h3 class="font-medium text-violet-400 mb-4">3. Live Deployment</h3>
                    <div id="live-status" class="text-emerald-400">Ready for Vercel deploy</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function runPipeline() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) {
                alert('Please enter a prompt!');
                return;
            }

            const output = document.getElementById('output');
            output.classList.remove('hidden');

            // Generate smart Canva prompt
            const canvaPromptEl = document.getElementById('canva-prompt');
            canvaPromptEl.textContent = `Create a professional design in Canva Magic Studio for:
${prompt}

Style: Modern, clean, high-conversion. Use brand kit if available.`;

            document.getElementById('live-status').innerHTML = `
                <div class="animate-pulse">✅ Pipeline triggered!</div>
                <p class="mt-3 text-sm">1. Paste above prompt into Canva Magic Studio</p>
                <p class="text-sm">2. Export assets to Google Drive</p>
                <p class="text-sm">3. Deploy this repo on Vercel</p>
            `;

            console.log('Full pipeline test started with prompt:', prompt);
        }

        // Tailwind script already loaded
    </script>
</body>
</html>
